name: Update GitHub stats card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  stats-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (rank + activity)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&hide=stars,contribs&show=prs_merged,prs_merged_percentage'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          git commit -m "docs: refresh GitHub stats card SVG" || exit 0
          git push
