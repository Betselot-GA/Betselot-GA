name: Update GitHub stats card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  stats-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate stats card (rank + activity)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # keep options simple so the renderer parses reliably; rank shows by default (no hide_rank)
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&hide=stars%2Ccontribs&show=prs_merged%2Cprs_merged_percentage'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh profile/stats.svg"
          file_pattern: profile/stats.svg
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
